name: Generate daily CEDETU content

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *" # 07:00 America/Guatemala (UTC-6)

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: content-generator
        run: npm install
      - name: Generate campaign
        working-directory: content-generator
        run: node generate_daily_content.js
      - name: Validate assets
        working-directory: content-generator
        run: node validate_outputs.js
      - name: Upload for human review
        uses: actions/upload-artifact@v4
        with:
          name: cedetu-daily-content
          path: content-generator/output/
          retention-days: 30
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content-generator/output/ content-generator/content_history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generate daily campaign from GitHub Actions ($(date +%F))" && git push origin main)
      - name: Trigger n8n Workflow
        run: |
          curl -X POST https://n8n.centrodetutorias.com/webhook/daily-content-trigger \
            -H "Content-Type: application/json" \
            -d "{\"date\": \"$(date +%F)\"}"
