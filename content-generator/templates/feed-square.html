<section id="feed-square" class="artboard feed-square" aria-label="{{altText}}">
  <div class="copy">
    {{brandBlock}}
    <div class="eyebrow">{{themeName}}</div>
    <h1 class="headline">{{headline}}</h1>
    <p class="subtitle">{{subtitle}}</p>
    <div class="cta">{{cta}} <span class="cta-arrow">→</span></div>
  </div>
  <div class="visual"><img class="photo" src="{{imagePath}}" alt=""></div>
  <div class="url-band">{{displayUrl}}</div>
</section>
