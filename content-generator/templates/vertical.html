<section id="vertical" class="artboard vertical" aria-label="{{altText}}">
  <img class="photo" src="{{imagePath}}" alt="">
  <div class="photo-shade"></div>
  <div class="top">
    {{brandBlock}}
    <div class="eyebrow">{{themeName}}</div>
    <h1 class="headline">{{headline}}</h1>
    <p class="subtitle">{{subtitle}}</p>
  </div>
  <div class="cta">{{cta}} <span class="cta-arrow">→</span></div>
  {{footerBlock}}
</section>
